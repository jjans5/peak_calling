    ctx_db: "{base_dir}/atac/cistarget_databases/database/Macaque_1kb_bg_with_mask.regions_vs_motifs.rankings.feather"
    dem_db: "{base_dir}/atac/cistarget_databases/database/Macaque_1kb_bg_with_mask.regions_vs_motifs.scores.feather"
    motif_annotations: /home/jjanssens/jjans/resources/resources.aertslab.org/cistarget/motif2tf/motifs-v10nr_clust-nr.hgnc-m0.001-o0.0.tbl
    region_set_folder: "{base_dir}/atac/region_sets_Macaque"
    genome_annotation: "{input_files_dir}/Macaque_genome_annotation.txt"
    chromsizes: "{input_files_dir}/Macaque_chromsizes.tsv"
  Marmoset:
    biomart_species: cjacchus
    ctx_db: "{base_dir}/atac/cistarget_databases/database/Marmoset_1kb_bg_with_mask.regions_vs_motifs.rankings.feather"
    dem_db: "{base_dir}/atac/cistarget_databases/database/Marmoset_1kb_bg_with_mask.regions_vs_motifs.scores.feather"
